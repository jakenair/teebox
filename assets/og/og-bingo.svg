  <!-- Sub-tagline -->
  <text x="80" y="490" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="20" fill="#f6efe1" fill-opacity="0.72">
    A new round daily. Share your score, challenge a friend.
  </text>

  <!-- App Store badge bottom-left -->
  
    <g transform="translate(80, 528)">
