<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  
    <defs>
      <radialGradient id="plate" cx="22%" cy="35%" r="85%">
        <stop offset="0%" stop-color="#16301d" />
        <stop offset="55%" stop-color="#0b1a0e" />
        <stop offset="100%" stop-color="#070f09" />
      </radialGradient>
      <linearGradient id="goldRule" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#d6a900" stop-opacity="0" />
        <stop offset="20%" stop-color="#d6a900" stop-opacity="1" />
        <stop offset="80%" stop-color="#d6a900" stop-opacity="1" />
        <stop offset="100%" stop-color="#d6a900" stop-opacity="0" />
      </linearGradient>
      <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
        <circle cx="2" cy="2" r="1" fill="#d6a900" fill-opacity="0.06" />
      </pattern>
    </defs>
    <rect width="1200" height="630" fill="url(#plate)" />
    <rect width="1200" height="630" fill="url(#dots)" />
    <!-- gold inner border -->
    <rect x="24" y="24" width="1152" height="582"
          fill="none" stroke="#d6a900" stroke-opacity="0.35" stroke-width="2" rx="14" />
  

  <!-- Eyebrow -->
  <text x="80" y="160" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="600"
        fill="#e9c64a" letter-spacing="6">DAILY GOLF GAME</text>

  <!-- Wordmark -->
  
    <text x="76" y="290" font-family="'Iowan Old Style','Apple Garamond','Baskerville','Times New Roman',Times,serif" font-size="156"
          font-weight="700" letter-spacing="-2">
      <tspan fill="#d6a900">Tee</tspan><tspan fill="#ffffff">Box</tspan>
    </text>
  

  <!-- Gold rule -->
  <rect x="80" y="320" width="280" height="3" fill="url(#goldRule)" />

  <!-- Tagline -->
  <text x="80" y="395" font-family="'Iowan Old Style','Apple Garamond','Baskerville','Times New Roman',Times,serif" font-size="56" font-weight="500"
