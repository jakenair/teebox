<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  
    <defs>
      <radialGradient id="plate" cx="22%" cy="35%" r="85%">
        <stop offset="0%" stop-color="#16301d" />
        <stop offset="55%" stop-color="#0b1a0e" />
        <stop offset="100%" stop-color="#070f09" />
      </radialGradient>
      <linearGradient id="goldRule" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#d6a900" stop-opacity="0" />
        <stop offset="20%" stop-color="#d6a900" stop-opacity="1" />
        <stop offset="80%" stop-color="#d6a900" stop-opacity="1" />
        <stop offset="100%" stop-color="#d6a900" stop-opacity="0" />
      </linearGradient>
      <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
        <circle cx="2" cy="2" r="1" fill="#d6a900" fill-opacity="0.06" />
      </pattern>
    </defs>
    <rect width="1200" height="630" fill="url(#plate)" />
    <rect width="1200" height="630" fill="url(#dots)" />
    <!-- gold inner border -->
    <rect x="24" y="24" width="1152" height="582"
          fill="none" stroke="#d6a900" stroke-opacity="0.35" stroke-width="2" rx="14" />
  

  <!-- Eyebrow -->
  <text x="80" y="160" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="600"
        fill="#e9c64a" letter-spacing="6">PEER-TO-PEER GOLF MARKETPLACE</text>

  <!-- Wordmark -->
  
    <text x="76" y="310" font-family="'Iowan Old Style','Apple Garamond','Baskerville','Times New Roman',Times,serif" font-size="196"
          font-weight="700" letter-spacing="-2">
      <tspan fill="#d6a900">Tee</tspan><tspan fill="#ffffff">Box</tspan>
    </text>
  

  <!-- Gold rule -->
  <rect x="80" y="345" width="320" height="3" fill="url(#goldRule)" />

  <!-- Tagline -->
  <text x="80" y="420" font-family="'Iowan Old Style','Apple Garamond','Baskerville','Times New Roman',Times,serif" font-size="46" font-weight="500"
        fill="#f6efe1">The Premier Golf Marketplace</text>

  <!-- Sub-tagline -->
  <text x="80" y="470" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="22" fill="#f6efe1" fill-opacity="0.78">
    Buy and sell clubs, apparel, and accessories — secured by Stripe.
  </text>

  <!-- App Store badge bottom-left -->
  
    <g transform="translate(80, 522)">
      <rect width="240" height="64" rx="12" fill="#000" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1" />
      <!-- Apple logo glyph (simplified) -->
      <g transform="translate(20, 14) scale(0.9)" fill="#ffffff">
        <path d="M22.5 19.7c0-3.3 2.7-4.9 2.8-5-1.5-2.2-3.9-2.5-4.7-2.5-2-.2-3.9 1.2-4.9 1.2-1 0-2.6-1.2-4.3-1.1-2.2 0-4.2 1.3-5.4 3.3-2.3 4-.6 9.9 1.7 13.1 1.1 1.6 2.4 3.4 4.1 3.3 1.6-.1 2.3-1.1 4.3-1.1 2 0 2.5 1.1 4.3 1 1.8 0 2.9-1.6 4-3.2 1.3-1.8 1.8-3.6 1.8-3.7-.1 0-3.4-1.3-3.7-5.3zM19.6 9.7c.9-1.1 1.5-2.6 1.3-4.1-1.3.1-2.8.9-3.7 1.9-.8.9-1.6 2.4-1.4 3.9 1.4.1 2.9-.7 3.8-1.7z"/>
      </g>
      <text x="74" y="26" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#ffffff" fill-opacity="0.85" letter-spacing="0.5">Download on the</text>
      <text x="74" y="48" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="600" fill="#ffffff">App Store</text>
    </g>
  

  <!-- Right-side accent: stylized golf-ball circle on tee -->
  <g transform="translate(880, 180)" opacity="0.95">
    <!-- aura -->
    <circle cx="120" cy="140" r="190" fill="#d6a900" fill-opacity="0.07" />
    <circle cx="120" cy="140" r="140" fill="#d6a900" fill-opacity="0.10" />
    <!-- ball -->
    <circle cx="120" cy="140" r="92" fill="#ffffff" />
    <circle cx="120" cy="140" r="92" fill="none" stroke="#0b1a0e" stroke-opacity="0.15" stroke-width="2" />
    <!-- dimples (sparse pattern) -->
    <g fill="#0b1a0e" fill-opacity="0.10">
      <circle cx="92" cy="112" r="4"/>
      <circle cx="120" cy="98" r="4"/>
      <circle cx="148" cy="112" r="4"/>
      <circle cx="78" cy="140" r="4"/>
      <circle cx="106" cy="130" r="4"/>
      <circle cx="134" cy="130" r="4"/>
      <circle cx="162" cy="140" r="4"/>
      <circle cx="92" cy="168" r="4"/>
      <circle cx="120" cy="156" r="4"/>
      <circle cx="148" cy="168" r="4"/>
      <circle cx="106" cy="184" r="4"/>
      <circle cx="134" cy="184" r="4"/>
    </g>
    <!-- tee -->
    <path d="M 100 244 L 140 244 L 132 286 L 120 304 L 108 286 Z"
          fill="#d6a900" />
    <rect x="86" y="240" width="68" height="8" rx="4" fill="#d6a900" />
  </g>

  <!-- Domain footer -->
  <text x="1120" y="588" text-anchor="end" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="18"
        fill="#f6efe1" fill-opacity="0.55" letter-spacing="2">teeboxmarket.com</text>
</svg>